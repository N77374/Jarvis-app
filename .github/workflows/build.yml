name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autotools-dev \
            autoconf \
            libtool \
            pkg-config \
            ccache \
            libncurses-dev \
            libtinfo6 \
            zlib1g-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            lld \
            build-essential

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "cython==0.29.33" "buildozer==1.5.0"

      - name: Inject API Key into main.py
        run: |
          if [ -f main.py ]; then
            sed -i "s/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" main.py
          fi

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jarvis-app-apk
          path: bin/*.apk
          

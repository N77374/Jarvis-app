name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autotools-dev \
            autoconf \
            libtool \
            pkg-config \
            ccache \
            libncurses-dev \
            libtinfo6 \
            zlib1g-dev \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Inject API Key into main.py
        run: |
          sed -i "s/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g" main.py

      - name: Ensure Stable NDK Version in buildozer.spec
        run: |
          if [ -f buildozer.spec ]; then
            sed -i 's/^#\?\s*android.ndk\s*=.*/android.ndk = 25b/' buildozer.spec
            sed -i 's/^#\?\s*android.api\s*=.*/android.api = 33/' buildozer.spec
            sed -i 's/^#\?\s*android.minapi\s*=.*/android.minapi = 21/' buildozer.spec
          fi

      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-app-apk
          path: bin/*.apk
          
